onnxruntime_controller:
  observation_interfaces:
    {
      type: "string_array",
      description: "The names and order of the interfaces to use for observations.",
      default_value: [],
      read_only: true,
    }
  observation_types:
    {
      type: "string_array",
      description: "The ROS2 message types of observation interfaces.",
      default_value: [],
      read_only: true,
    }
  observation_scales:
    {
      type: "double_array",
      description: "The scales for each observation interface.",
      default_value: [],
      read_only: true,
    }
  observation_offsets:
    {
      type: "double_array",
      description: "The offsets for each observation interface.",
      default_value: [],
      read_only: true,
    }
  actions_interface:
    {
      type: "string",
      description: "The joint command_interface name for actions.",
      default_value: "position",
      read_only: true,
    }
  actions_scale:
    {
      type: "double",
      description: "The scale to apply to all actions interfaces.",
      default_value: 1.0,
      read_only: true,
    }
  action_offsets:
    {
      type: "double_array",
      description: "The offset to apply to each action interface.",
      default_value: [],
      read_only: true,
    }
  clip_actions:
    {
      type: "double",
      description: "Threshold to clip the absolute value of actions.",
      default_value: 0.0,
      read_only: true,
    }
  reference_interfaces:
    {
      type: "string_array",
      description: "The controller reference interfaces to use as command inputs.",
      default_value: [],
      read_only: true,
    }
  reference_types:
    {
      type: "string_array",
      description: "The ROS2 message types of reference interfaces.",
      default_value: [],
      read_only: true,
    }
  reference_timeout:
    {
      type: "double",
      description: "The timeout for reference interface updates, in seconds.",
      default_value: 0.5,
      read_only: true,
    }
  joint_names:
    {
      type: "string_array",
      description: "The names of the joints in the order they are processed in both observations and actions.",
      default_value: [],
      read_only: true,
    }
  model_path:
    {
      type: "string",
      description: "The path to the ONNX model file.",
      default_value: "",
      read_only: true,
    }
